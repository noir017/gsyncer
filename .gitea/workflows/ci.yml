name: CI

# gsync 作为独立仓库推送到 Gitea 时，本文件位于仓库根的 .gitea/workflows/ci.yml。
# 若整个父目录作为单仓库推送，需给各 run 步骤加 working-directory: gsync。
on: [push, pull_request]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下文件未通过 gofmt，请运行 gofmt -w ："
            echo "$unformatted"
            exit 1
          fi

      - name: Verify module dependencies
        run: go mod verify

      - name: go vet
        run: go vet ./...

      - name: Build static linux binary
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags "-s -w" -o dist/gsync .

      - name: Test (with race detector)
        env:
          CGO_ENABLED: "1"
        run: go test -race -count=1 ./...
