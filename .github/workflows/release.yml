# 构建多平台二进制并发布 GitHub Release。
# 两种触发方式：
#   1. 推送 v* 标签（自动）：  git tag v0.2.0 && git push origin v0.2.0
#   2. Actions 页面手动运行（workflow_dispatch）：填入版本号（带 v 前缀，如 v0.2.0），
#      会在当前分支的最新 commit 上创建该标签并发布。
# 版本号取自标签或手动输入（去掉 v 前缀），通过 -ldflags -X 注入 main.version。
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（带 v 前缀，如 v0.2.0）"
        required: true
        type: string

permissions:
  contents: write # 创建 Release 需要写权限

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        # e2e 包由 `e2e` build tag 保护，默认 go test ./... 会自动跳过
        run: go test ./...

  release:
    name: Build & Release
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build binaries
        env:
          CGO_ENABLED: "0" # 静态编译，不链接 libc（与 build.sh 保持一致）
          # tag 触发时 inputs.version 为空，回退到标签名 github.ref_name；手动触发用输入值。
          RELEASE_TAG: ${{ inputs.version || github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          mkdir -p dist

          # 目标平台列表: GOOS/GOARCH
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            GOOS="${target%/*}"
            GOARCH="${target#*/}"
            EXT=""
            [ "$GOOS" = "windows" ] && EXT=".exe"
            OUT="dist/gsyncer_${VERSION}_${GOOS}_${GOARCH}"

            echo "==> 构建 $GOOS/$GOARCH"
            GOOS="$GOOS" GOARCH="$GOARCH" \
              go build -trimpath \
                -ldflags "-s -w -X main.version=${VERSION}" \
                -o "${OUT}/gsyncer${EXT}" .

            cp LICENSE README.md "$OUT/"

            # linux/darwin 打 tar.gz，windows 打 zip
            if [ "$GOOS" = "windows" ]; then
              (cd dist && zip -qr "$(basename "$OUT").zip" "$(basename "$OUT")")
            else
              tar -czf "${OUT}.tar.gz" -C dist "$(basename "$OUT")"
            fi
            rm -rf "$OUT"
          done

          # 生成校验和文件
          (cd dist && sha256sum ./* > checksums.txt)
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 显式指定标签：tag 触发时即该标签；手动触发时在当前 commit 上创建它。
          tag_name: ${{ inputs.version || github.ref_name }}
          files: dist/*
          generate_release_notes: true # 从合并的 PR / commit 自动生成更新日志
